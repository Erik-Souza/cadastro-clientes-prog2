<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        /* Estilos básicos para deixar a tela responsiva e amigável */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px; /* Aumentei um pouco para a tabela caber melhor */
        }
        h2, h3 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #218838; }
        #mensagem { text-align: center; margin-top: 15px; font-weight: bold; }
        
        /* Estilos da Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .btn-editar { background: #007bff; padding: 5px 10px; font-size: 12px; width: auto; margin-right: 5px; }
        .btn-editar:hover { background: #0056b3; }
        .btn-excluir { background: #dc3545; padding: 5px 10px; font-size: 12px; width: auto; }
        .btn-excluir:hover { background: #a71d2a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Novo Cliente</h2>
    
    <form id="formCadastro">
        <div class="form-group">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone">
        </div>
        <button type="submit">Cadastrar</button>
    </form>

    <div id="mensagem"></div>

    <hr style="margin: 30px 0; border-top: 1px solid #eee;">
    
    <h3>Clientes Cadastrados</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th style="text-align: center;">Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes">
            </tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
